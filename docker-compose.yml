version: '3.9'

services:
  # Spring Boot Application
  app:
    build:
      context: .
      dockerfile: src/main/java/com/mycompany/Dockerfile
    container_name: course-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/course_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - JAVA_OPTS=-Xmx512m -Xms256m
      - JWT_SECRET_FILE=/run/secrets/jwt_hs512_key
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-https://localhost:8080/login/oauth2/code/google}
    secrets:
      - jwt_hs512_key
    depends_on:
      - mysql
      - redis
    networks:
      - course-network
    restart: unless-stopped

  # MySQL Database
  mysql:
    image: mysql:8.3
    container_name: course-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=course_db
      - MYSQL_USER=course_user
      - MYSQL_PASSWORD=course_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - course-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: course-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - course-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  redis_data:

networks:
  course-network:
    driver: bridge

secrets:
  jwt_hs512_key:
    file: ./secrets/jwt_hs512_key.txt

